publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  collection: ^1.19.0
  connectivity_plus: ^6.1.1
  crypto: ^3.0.6
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  intl: ^0.20.2
  package_info_plus: ^10.1.0
  path: ^1.9.1
  path_provider: ^2.1.5
  sentry_flutter: ^8.14.2
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2
  supabase_flutter: ^2.12.4
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  sqflite_common_ffi_web: ^1.1.1

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
